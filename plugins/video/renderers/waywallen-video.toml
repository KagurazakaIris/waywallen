# waywallen-video — the canonical video renderer for waywallen.
#
# Pipeline: best-effort Vulkan hwdevice (FFmpeg AV_HWDEVICE_TYPE_VULKAN)
# decode → sw landing frame → swscale to NV12 → GPU NV12→RGBA compute
# pass into the bridge slot. PTS-driven pacing. render_node pins the
# Vulkan physical device used for the compute pass.
#
# Successor to the libmpv plugin (removed in Iter 5).

[renderer]
name = "waywallen-video"
bin = "../../../bin/waywallen-video-renderer"
types = ["video"]
priority = 100
spawn_version = 1

[renderer.settings]
loop_file   = { type = "string", default = "inf",  identity = false }
hwdec       = { type = "string", default = "auto", identity = false }
render_node = { type = "string", default = "",     identity = true  }
